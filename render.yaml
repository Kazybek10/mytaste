databases:
  - name: mytaste-db
    databaseName: mytaste_production
    user: mytaste
    plan: free

services:
  - type: web
    name: mytaste
    plan: free
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mytaste-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
